<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Employee Dashboard
    </h1>

    <div class="row">

        <!-- Total Employees -->

        <div class="col-md-3">

            <div class="card text-center shadow">

                <div class="card-body">

                    <h5>Total Employees</h5>

                    <h2>
                        {{ total_employees }}
                    </h2>

                </div>

            </div>

        </div>

        <!-- Total Departments -->

        <div class="col-md-3">

            <div class="card text-center shadow">

                <div class="card-body">

                    <h5>Departments</h5>

                    <h2>
                        {{ total_departments }}
                    </h2>

                </div>

            </div>

        </div>

        <!-- Highest Salary -->

        <div class="col-md-3">

            <div class="card text-center shadow">

                <div class="card-body">

                    <h5>Highest Salary</h5>

                    <h2>
                        ₹{{ highest_salary }}
                    </h2>

                </div>

            </div>

        </div>

        <!-- Average Salary -->

        <div class="col-md-3">

            <div class="card text-center shadow">

                <div class="card-body">

                    <h5>Average Salary</h5>

                    <h2>
                        ₹{{ average_salary|floatformat:2 }}
                    </h2>

                </div>

            </div>

        </div>

    </div>
    <div class="mt-5">

        <canvas id="departmentChart"></canvas>

    </div>

    <div class="text-center mt-5">

        <a href="/"
           class="btn btn-primary">
            Back to Employees
        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Chart JavaScript -->

<script>

    const ctx = document.getElementById('departmentChart');

    new Chart(ctx, {

        type: 'bar',

        data: {

            labels: {{ department_names|safe }},

            datasets: [{

                label: 'Employees by Department',

                data: {{ department_counts|safe }},

                borderWidth: 1

            }]

        },

        options: {

            scales: {

                y: {

                    beginAtZero: true

                }

            }

        }

    });

</script>


</body>
</html>
