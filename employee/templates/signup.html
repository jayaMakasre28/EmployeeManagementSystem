<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow p-4">

                <h2 class="text-center mb-4">
                    Signup
                </h2>

                <!-- Messages -->

                {% if messages %}

                    {% for message in messages %}

                        <div class="alert alert-danger">

                            {{ message }}

                        </div>

                    {% endfor %}

                {% endif %}

                <!-- Form -->

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input type="text"
                               name="username"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Confirm Password
                        </label>

                        <input type="password"
                               name="confirm_password"
                               class="form-control"
                               required>

                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100">

                        Signup

                    </button>

                </form>

                <div class="text-center mt-3">

                    <a href="/login/">
                        Already have an account?
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
